<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK - Login</title>
    <link rel="stylesheet" href="pages/index.css" />
    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container onboarding-bg">
      <main class="">
        <div class="onboarding-overlay"></div>

   <div class="login">

  <!-- CABEÇALHO -->
  <div class="login__header">
    <a href="boas-vindas.html" class="login__back">
      <i class="fa-solid fa-arrow-left"></i>
      Voltar
    </a>

    <h2 class="login__title">
      Aceder à conta
    </h2>

    <p class="login__subtitle">
      Entre para conferir as suas estatísticas e convocatórias.
    </p>
  </div>

  <!-- FORMULÁRIO -->
  <form class="login__form" action="home.html">

    <!-- E-mail -->
    <div class="input-field-group">
      <label>E-mail</label>

      <div class="input-wrapper">
        <i class="fa-solid fa-envelope"></i>

        <input
          type="email"
          placeholder="seuemail@provedor.com"
          required
        />
      </div>
    </div>

    <!-- Senha -->
    <div class="input-field-group">

      <div class="login__password-header">
        <label>Senha</label>

        <a href="#" class="login__forgot-password">
          Esqueceu?
        </a>
      </div>

      <div class="input-wrapper">
        <i class="fa-solid fa-lock"></i>

        <input
          type="password"
          placeholder="Digite a sua senha"
          required
        />
      </div>

    </div>

    <!-- Manter conectado -->
    <div class="auth-options">
      <input
        type="checkbox"
        id="remember"
        class="custom-checkbox"
      />

      <label
        for="remember"
        class="login__remember"
      >
        Manter-me conectado neste dispositivo
      </label>
    </div>

    <!-- Botão -->
    <button
      type="submit"
      class="btn-onboarding btn-onboarding--primary login__button"
    >
      ENTRAR NO CAMPO
    </button>

  </form>

  <!-- Rodapé -->
  <p class="login__footer">
    Ainda não tem conta?

    <a
      href="cadastro.html"
      class="login__register-link"
    >
      Criar Conta
    </a>
  </p>

</div>
      </main>
    </div>
  </body>
</html>
