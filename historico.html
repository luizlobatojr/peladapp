<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelada Pro - Histórico de Jogos</title>
    <link rel="stylesheet" href="pages/index.css" />
    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="app-container">
      <!-- HEADER DO APP -->
      <!-- COPIE E COLE ESTE BLOCO EXATO EM AMBOS OS ARQUIVOS HTML -->
      <header class="app-header">
        <div class="app-header__logo-container">
          <div class="app-header__logo">
            <i class="fa-solid fa-futbol"></i>
            <h1>PELADA <span class="app-header__logo--highlight">PRO</span></h1>
          </div>
          <!-- No segundo arquivo, altere este texto para "Gestão de Partida" -->
          <p class="app-header__subtitle">Histórico</p>
        </div>

        <!-- Mantido mesmo sem ícone para equilibrar o alinhamento flex -->
        <a
          href="configuracoes.html"
          class="app-header__settings-btn"
          style="color: inherit; font-size: 1.25rem"
        >
          <i class="fa-solid fa-gear"></i>
        </a>
      </header>
      <!-- LISTA DE HISTÓRICO (SCROLLÁVEL) -->
      <section class="history-list">
        <h3 class="section-title">Cartões de Atributos</h3>

        <!-- Card Partida 1 -->
        <div class="history-card">
          <div class="history-card__header">
            <span class="history-card__date">15 de Junho</span>
            <span class="history-card__badge-mvp">MVP</span>
          </div>

          <p class="history-card__match-title">Pelada de Sábado</p>

          <div class="history-card__scoreboard">
            <div class="team-score">
              <span class="team-score__name">Team A</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team A"
                class="team-score__avatar"
              />
              <span class="team-score__points">3</span>
            </div>

            <span class="history-card__vs">vs</span>

            <div class="team-score">
              <span class="team-score__points">2</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team B"
                class="team-score__avatar"
              />
              <span class="team-score__name">Team B</span>
            </div>
          </div>

          <div class="history-card__footer">
            <div class="history-card__info-item">
              <i class="fa-regular fa-clock"></i> 10m
            </div>
            <div class="history-card__info-item history-card__info-item--mvp">
              <i class="fa-solid fa-crown"></i> MVP
            </div>
          </div>
        </div>

        <!-- Card Partida 2 -->
        <div class="history-card">
          <div class="history-card__header">
            <span class="history-card__date">08 de Junho</span>
            <span class="history-card__badge-mvp">MVP</span>
          </div>

          <p class="history-card__match-title">Pelada de Sábado</p>

          <div class="history-card__scoreboard">
            <div class="team-score">
              <span class="team-score__name">Team A</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team A"
                class="team-score__avatar"
              />
              <span class="team-score__points">3</span>
            </div>

            <span class="history-card__vs">vs</span>

            <div class="team-score">
              <span class="team-score__points">2</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team B"
                class="team-score__avatar"
              />
              <span class="team-score__name">Team B</span>
            </div>
          </div>

          <div class="history-card__footer">
            <div class="history-card__info-item">
              <i class="fa-regular fa-clock"></i> 10m
            </div>
            <div class="history-card__info-item history-card__info-item--mvp">
              <i class="fa-solid fa-crown"></i> MVP
            </div>
          </div>
        </div>

        <!-- Card Partida 3 -->
        <div class="history-card">
          <div class="history-card__header">
            <span class="history-card__date">01 de Junho</span>
            <span class="history-card__badge-mvp">MVP</span>
          </div>

          <p class="history-card__match-title">Pelada de Sábado</p>

          <div class="history-card__scoreboard">
            <div class="team-score">
              <span class="team-score__name">Team A</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team A"
                class="team-score__avatar"
              />
              <span class="team-score__points">3</span>
            </div>

            <span class="history-card__vs">vs</span>

            <div class="team-score">
              <span class="team-score__points">1</span>
              <img
                src="https://via.placeholder.com/32"
                alt="Avatar Team B"
                class="team-score__avatar"
              />
              <span class="team-score__name">Team B</span>
            </div>
          </div>

          <div class="history-card__footer">
            <div class="history-card__info-item">
              <i class="fa-regular fa-clock"></i> 30m
            </div>
            <div class="history-card__info-item history-card__info-item--mvp">
              <i class="fa-solid fa-crown"></i> MVP
            </div>
          </div>
        </div>
      </section>

      <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
      <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav__item">
          <i class="fa-solid fa-house"></i>
          <span>Início</span>
        </a>
        <a href="times.html" class="bottom-nav__item">
          <i class="fa-solid fa-users"></i>
          <span>Times</span>
        </a>
        <a href="carta.html" class="bottom-nav__item">
          <i class="fa-solid fa-trophy"></i>
          <span>Ranking</span>
        </a>
        <a
          href="historico.html"
          class="bottom-nav__item bottom-nav__item--active"
        >
          <i class="fa-solid fa-clock-rotate-left"></i>
          <span>Histórico</span>
        </a>
        <a href="perfil.html" class="bottom-nav__item">
          <i class="fa-solid fa-user"></i>
          <span>Perfil</span>
        </a>
      </nav>
      >
    </main>
  </body>
</html>
