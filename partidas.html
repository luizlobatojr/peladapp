<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK - Minhas Partidas</title>
    <link rel="stylesheet" href="pages/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header__logo">
          <i class="header__logo-icon fa-solid fa-soccer-ball"></i>
          <span class="header__logo-text">
            FUT<span class="header__logo-highlight">RANK</span>
          </span>
        </div>

        <div class="header__actions">
          <div class="header__notification">
            <i class="header__notification-icon fa-regular fa-bell"></i>
            <span class="header__notification-badge">2</span>
          </div>
          <img
            src="https://via.placeholder.com/40"
            alt="Profile"
            class="header__avatar"
          />
        </div>
      </header>


      <nav class="nav">
        <a href="home.html" class="nav__item "
          ><i class="fa-solid fa-house"></i
          ><span class="nav__text">Início</span></a
        >
        <a href="partidas.html" class="nav__item nav__item--active"
          ><i class="fa-regular fa-calendar"></i
          ><span class="nav__text">Partidas</span></a
        >
        <a
          href="criar-partida.html"
          class="nav__item nav__item--create"
          ><i class="fa-solid fa-plus"></i
        ></a>
        <a href="ranking.html" class="nav__item"
          ><i class="fa-solid fa-trophy"></i
          ><span class="nav__text">Ranking</span></a
        >
        <a href="mais.html" class="nav__item"
          ><i class="fa-solid fa-bars"></i
          ><span class="nav__text">Mais</span></a
        >
      </nav>
    </div>
  </body>
</html>
