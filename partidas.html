<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK - Minhas Partidas</title>
    <link rel="stylesheet" href="pages/index.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header__logo">
          <i class="header__logo-icon fa-solid fa-soccer-ball"></i>
          <span class="header__logo-text">
            FUT<span class="header__logo-highlight">RANK</span>
          </span>
        </div>

        <div class="header__actions">
          <div class="header__notification">
            <i class="header__notification-icon fa-regular fa-bell"></i>
            <span class="header__notification-badge">2</span>
          </div>
          <img
            src="https://via.placeholder.com/40"
            alt="Profile"
            class="header__avatar"
          />
        </div>
      </header>

      <section class="screen-header">
        <h1>Minhas Partidas</h1>
        <p>Preencha os detalhes da sua pelada</p>
      </section>

      <section class="section-block">
        <h2 class="section-title">Próxima partida</h2>

        <div class="main-match-card">
          <div class="main-match-info">
            <div class="date-badge">
              <span class="day-name">SEXTA-FEIRA</span>
              <span class="day-num">14</span>
              <span class="month-name">JUN</span>
              <span class="time-badge">20:00</span>
            </div>

            <div class="location-details">
              <div class="stadium-icon-wrapper">
                <i class="fa-solid fa-circle-nodes"></i>
              </div>
              <h3>Arena Gramado Sintético</h3>
              <p><i class="fa-solid fa-location-dot"></i> Matosinhos, Porto</p>
              <button class="btn-map-link">
                <i class="fa-solid fa-location-crosshairs"></i> Ver no mapa
              </button>
            </div>

            <div class="match-status-side">
              <span class="price-tag">5,00€ <small>/ jogador</small></span>
              <div class="confirmed-box">
                <span class="label">Confirmados</span>
                <span class="count">16<span class="total">/20</span></span>
              </div>
              <div class="avatar-group">
                <img src="https://via.placeholder.com/24" alt="Player" />
                <img src="https://via.placeholder.com/24" alt="Player" />
                <img src="https://via.placeholder.com/24" alt="Player" />
                <div class="avatar-more">+12</div>
              </div>
            </div>
          </div>

          <div class="rsvp-footer">
            <div class="rsvp-text">
              <h4>Você vai participar?</h4>
              <p>Confirme sua presença e ajude a fechar o time!</p>
            </div>
            <div class="rsvp-buttons">
              <button class="btn-rsvp yes">
                <i class="fa-solid fa-thumbs-up"></i> EU VOU
              </button>
              <button class="btn-rsvp no">
                <i class="fa-solid fa-thumbs-down"></i> NÃO VOU
              </button>
            </div>
          </div>
        </div>
      </section>

      <nav class="nav">
        <a href="index.html" class="nav__item "
          ><i class="fa-solid fa-house"></i
          ><span class="nav__text">Início</span></a
        >
        <a href="partidas.html" class="nav__item nav__item--active"
          ><i class="fa-regular fa-calendar"></i
          ><span class="nav__text">Partidas</span></a
        >
        <a
          href="criar-partida.html"
          class="nav__item nav__item--create"
          ><i class="fa-solid fa-plus"></i
        ></a>
        <a href="ranking.html" class="nav__item"
          ><i class="fa-solid fa-trophy"></i
          ><span class="nav__text">Ranking</span></a
        >
        <a href="mais.html" class="nav__item"
          ><i class="fa-solid fa-bars"></i
          ><span class="nav__text">Mais</span></a
        >
      </nav>
    </div>
  </body>
</html>
