<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK - Criar Conta</title>
    <link rel="stylesheet" href="pages/index.css" />
    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container onboarding-bg">
      <main class="">
        <div class="onboarding-overlay"></div>
        <div class="register">
          <!-- CABEÇALHO -->
          <div class="register__header">
            <a href="boas-vindas.html" class="register__back">
              <i class="fa-solid fa-arrow-left"></i>
              Voltar
            </a>

            <h2 class="register__title">Criar nova conta</h2>

            <p class="register__subtitle">
              Monte o seu perfil de atleta e comece a pontuar.
            </p>
          </div>

          <!-- FORMULÁRIO -->
          <form class="register__form" action="index.html">
            <div class="input-field-group">
              <label>Nome Completo</label>

              <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="Ex: Luiz Otávio" required />
              </div>
            </div>

            <div class="input-field-group">
              <label>
                Nome de Jogo
                <span class="register__highlight">(Aparece no Card)</span>
              </label>

              <div class="input-wrapper">
                <i class="fa-solid fa-id-card"></i>
                <input
                  type="text"
                  placeholder="Ex: L. OTÁVIO"
                  maxlength="12"
                  required
                />
              </div>
            </div>

            <div class="input-field-group">
              <label>E-mail</label>

              <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input
                  type="email"
                  placeholder="seuemail@provedor.com"
                  required
                />
              </div>
            </div>

            <div class="input-field-group">
              <label>Onde costuma jogar?</label>

              <div class="input-wrapper">
                <i class="fa-solid fa-shield-halved"></i>

                <select required>
                  <option value="" disabled selected hidden>
                    Selecione sua posição...
                  </option>

                  <option value="linha">Jogador de Linha (LIN)</option>

                  <option value="goleiro">Goleiro (GOL)</option>

                  <option value="misto">Misto (Linha e Gol)</option>
                </select>
              </div>
            </div>

            <div class="input-field-group">
              <label>Senha</label>

              <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>

                <input
                  type="password"
                  placeholder="No mínimo 6 caracteres"
                  required
                />
              </div>
            </div>

            <button
              type="submit"
              class="btn-onboarding btn-onboarding--primary register__button"
            >
              CONCLUIR CADASTRO
            </button>
          </form>

          <!-- LOGIN -->
          <p class="register__footer">
            Já tem uma conta?

            <a href="login.html" class="register__login-link"> Faça Login </a>
          </p>
        </div>
      </main>
    </div>
  </body>
</html>
