<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelada Pro - Bem-vindo</title>
    <link rel="stylesheet" href="pages/index.css">
    
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <main class="app-container onboarding-bg">
        
        <!-- ELEMENTOS VISUAIS DE FUNDO (GRAFITE/FUTEBOL) -->
        <div class="onboarding-overlay"></div>

        <!-- CONTEÚDO DA APRESENTAÇÃO -->
        <div class="onboarding-content">
            
            <!-- LOGO CENTRAL EM DESTAQUE -->
            <div class="onboarding-logo">
                <i class="fa-solid fa-futbol onboarding-logo__icon"></i>
                <h1 class="onboarding-logo__text">PELADA <span class="app-header__logo--highlight">PRO</span></h1>
                <p class="onboarding-logo__tagline">Sua resenha no nível Ultimate Team</p>
            </div>

            <!-- CAROUSEL DE BENEFÍCIOS (SIMULADO) -->
            <div class="features-carousel">
                <div class="features-carousel__item">
                    <div class="features-carousel__badge-icon">
                        <i class="fa-solid fa-dice"></i>
                    </div>
                    <h3>Sorteio Inteligente</h3>
                    <p>Divida os times automaticamente equilibrando o nível técnico de linha e gol.</p>
                </div>
            </div>

            <!-- INDICADOR DE PAGINAÇÃO (DOTS) -->
            <div class="carousel-dots">
                <span class="dot dot--active"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>

            <!-- BOTÕES DE AÇÃO PRINCIPAIS -->
            <div class="onboarding-actions">
                <a href="cadastro.html" class="btn-onboarding btn-onboarding--primary">
                    CRIAR MINHA CONTA
                </a>
                <a href="login.html" class="btn-onboarding btn-onboarding--secondary">
                    JÁ TENHO CONTA
                </a>
            </div>

            <!-- RODAPÉ DISCRETO -->
            <footer class="onboarding-footer">
                <p>Ao continuar, você concorda com os nossos Termos de Serviço.</p>
            </footer>

        </div>

    </main>

</body>
</html>
