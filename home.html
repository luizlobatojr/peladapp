<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="pages/index.css" />
    <!-- Ícone padrão para navegadores -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/icon/icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="assets/icon/icon.png"
    />

    <!-- Suporte para Apple Web App (iOS Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="#0b0f12" />
    <meta name="apple-mobile-web-app-title" content="Pelada Pro" />
    <link rel="apple-touch-icon" href="assets/icon/icon.png" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header__logo">
          <i class="header__logo-icon fa-solid fa-soccer-ball"></i>
          <span class="header__logo-text">
            FUT<span class="header__logo-highlight">RANK</span>
          </span>
        </div>

        <div class="header__actions">
          <div class="header__notification">
            <i class="header__notification-icon fa-regular fa-bell"></i>
            <span class="header__notification-badge">2</span>
          </div>
          <img
            src="https://via.placeholder.com/40"
            alt="Profile"
            class="header__avatar"
          />
        </div>
      </header>

      <section class="welcome">
        <div class="welcome__text">
          <h1 class="welcome__text-title">Olá, R. Silva! 👋</h1>
          <p class="welcome__text-text">Pronto para mais uma pelada?</p>
        </div>

        <div class="level-card">
          <div class="level-card__badge">12</div>
          <div class="level-card__progress">
            <span class="level-card__label">Nível 12</span>

            <div class="progress-bar">
              <div class="progress-bar__fill" style="width: 82%"></div>
            </div>
            <span class="level-card__xp">820 / 1000 XP</span>
          </div>
        </div>
      </section>

      <section class="next-match">
        <div>
          <div class="next-match__info">
            <i class="fa-regular fa-calendar-days icon-green"></i>
            <div>
              <span class="next-match__tag">PRÓXIMA PELADA</span>
              <h2 class="next-match__info--title">Sexta-feira, 14 Jun • 20:00</h2>
              <p class="next-match__info--subtitle">
                <i class="fa-solid fa-location-dot"></i> Arena Gramado Sintético
              </p>
              <p class="next-match__sub-location">Matosinhos, Porto</p>
            </div>
          </div>

          <div class="next-match__actions">
            <button class="btn btn-confirm">
              <i class="fa-regular fa-thumbs-up"></i> EU VOU
            </button>
            <button class="btn btn-decline">
              <i class="fa-regular fa-thumbs-down"></i> NÃO VOU
            </button>
          </div>
        </div>

        <div class="next-match__status">
          <span class="next-match__status--tag--price">5,00€ / jogador</span>
          <div class="next-match__status--comfimed">
            <span class="next-match__status--comfimed-label">Confirmados</span>
            <span class="next-match__status--comfimed-count">16 <span class="next-match__status--comfimed-count-span">/ 20</span></span>
          </div>
          <div class="next-match__status-avatar">
            <img class="next-match__status-avatar__img"  src="https://via.placeholder.com/30" alt="Player" />
            <img class="next-match__status-avatar__img" src="https://via.placeholder.com/30" alt="Player" />
            <img class="next-match__status-avatar__img" src="https://via.placeholder.com/30" alt="Player" />
            <div class="next-match__status-avatar-avatar-more">+7</div>
          </div>
        </div>
      </section>

      <nav class="nav">
        <a href="home.html" class="nav__item nav__item--active"
          ><i class="fa-solid fa-house"></i
          ><span class="nav__text">Início</span></a
        >
        <a href="partidas.html" class="nav__item"
          ><i class="fa-regular fa-calendar"></i
          ><span class="nav__text">Partidas</span></a
        >
        <a href="criar-partida.html" class="nav__item nav__item--create"
          ><i class="fa-solid fa-plus"></i
        ></a>
        <a href="ranking.html" class="nav__item"
          ><i class="fa-solid fa-trophy"></i
          ><span class="nav__text">Ranking</span></a
        >
        <a href="mais.html" class="nav__item"
          ><i class="fa-solid fa-bars"></i
          ><span class="nav__text">Mais</span></a
        >
      </nav>
    </div>
    
  </body>
</html>
