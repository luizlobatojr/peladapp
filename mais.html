<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FUTRANK - Centro de Controle</title>
    <link rel="stylesheet" href="pages/index.css" />
    <!-- Ícones FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="app-container">
      <header class="header">
        <div class="header__logo">
          <i class="header__logo-icon fa-solid fa-soccer-ball"></i>
          <span class="header__logo-text">
            FUT<span class="header__logo-highlight">RANK</span>
          </span>
        </div>

        <div class="header__actions">
          <div class="header__notification">
            <i class="header__notification-icon fa-regular fa-bell"></i>
            <span class="header__notification-badge">2</span>
          </div>
          <img
            src="https://via.placeholder.com/40"
            alt="Profile"
            class="header__avatar"
          />
        </div>
      </header>
      <!-- ⚙️ CONFIGURAÇÕES E SUPORTE -->
      <section class="menu-section">
        <h3 class="section-title">Configurações & Suporte</h3>
        <div class="settings-list-options">
          <div class="setting-row-item">
            <span><i class="fa-regular fa-moon"></i> Modo escuro</span>
            <label class="switch"
              ><input type="checkbox" checked /><span
                class="slider round"
              ></span
            ></label>
          </div>
          <a href="#" class="setting-row-item"
            ><span><i class="fa-regular fa-bell"></i> Notificações</span
            ><i class="fa-solid fa-angle-right"></i
          ></a>
          <a href="#" class="setting-row-item"
            ><span><i class="fa-solid fa-globe"></i> Idioma</span
            ><span class="sub-setting-text">PT-BR</span></a
          >
          <a href="#" class="setting-row-item"
            ><span
              ><i class="fa-solid fa-share-nodes"></i> Compartilhar App</span
            ><i class="fa-solid fa-angle-right"></i
          ></a>
          <a href="#" class="setting-row-item"
            ><span><i class="fa-regular fa-star"></i> Avaliar App</span
            ><i class="fa-solid fa-angle-right"></i
          ></a>
          <a href="#" class="setting-row-item"
            ><span><i class="fa-regular fa-envelope"></i> Suporte Técnico</span
            ><i class="fa-solid fa-angle-right"></i
          ></a>
        </div>
      </section>

      <!-- BOTÃO SAIR -->
      <button class="btn-logout-hub">
        <i class="fa-solid fa-power-off"></i> Terminar Sessão
      </button>
      <span class="app-version">Pelada Pro • Versão 3.1.0</span>

      <!-- NAV BAR INFERIOR DE 5 ABAS -->
      <nav class="nav">
        <a href="index.html" class="nav__item "
          ><i class="fa-solid fa-house"></i
          ><span class="nav__text">Início</span></a
        >
        <a href="partidas.html" class="nav__item"
          ><i class="fa-regular fa-calendar"></i
          ><span class="nav__text">Partidas</span></a
        >
        <a
          href="criar-partida.html"
          class="nav__item nav__item--create"
          ><i class="fa-solid fa-plus"></i
        ></a>
        <a href="ranking.html" class="nav__item"
          ><i class="fa-solid fa-trophy"></i
          ><span class="nav__text">Ranking</span></a
        >
        <a href="mais.html" class="nav__item nav__item--active"
          ><i class="fa-solid fa-bars"></i
          ><span class="nav__text">Mais</span></a
        >
      </nav>
    </div>
  </body>
</html>
