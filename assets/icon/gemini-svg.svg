<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Fundo Escuro do App -->
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0b0f12" />
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)" />

  <!-- Grupo Centralizado (Bola e Detalhes) -->
  <g transform="translate(256, 256) scale(0.85)">
    <!-- Brilho Neon de Fundo -->
    <circle r="160" fill="none" stroke="#22c55e" stroke-width="24" opacity="0.15" filter="blur(10px)" />
    
    <!-- Contorno Principal da Bola (Verde Neon) -->
    <circle r="160" fill="#13191e" stroke="#22c55e" stroke-width="16" />
    
    <!-- Gomos da Bola de Futebol (Estilizados) -->
    <polygon points="0,-60 -57,-18 -35,50 35,50 57,-18" fill="none" stroke="#22c55e" stroke-width="12" stroke-linejoin="round" />
    <line x1="0" y1="-60" x2="0" y2="-160" stroke="#22c55e" stroke-width="12" />
    <line x1="-57" y1="-18" x2="-152" y2="-50" stroke="#22c55e" stroke-width="12" />
    <line x1="57" y1="-18" x2="152" y2="-50" stroke="#22c55e" stroke-width="12" />
    <line x1="-35" y1="50" x2="-94" y2="130" stroke="#22c55e" stroke-width="12" />
    <line x1="35" y1="50" x2="94" y2="130" stroke="#22c55e" stroke-width="12" />
  </g>

  <!-- Estrela de Destaque / Elemento Ouro (Ranking/PRO) -->
  <path d="M400 100 L412 135 L448 135 L418 156 L430 192 L400 170 L370 192 L382 156 L352 135 L388 135 Z" fill="#eab308" />
</svg>
