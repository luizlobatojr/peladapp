<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pelada Pro - Gestão de Partida</title>
    <link rel="stylesheet" href="pages/index.css" />
    
    <!-- Ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <main class="app-container">
      <!-- HEADER DO APP -->
      <header class="app-header">
        <div class="app-header__logo-container">
    <div class="app-header__logo">
      <i class="fa-solid fa-futbol"></i>
      <h1>PELADA <span class="app-header__logo--highlight">PRO</span></h1>
    </div>
    <!-- No segundo arquivo, altere este texto para "Gestão de Partida" -->
    <p class="app-header__subtitle">Times</p> 
  </div>

  <!-- Mantido mesmo sem ícone para equilibrar o alinhamento flex -->
  <a href="configuracoes.html" class="app-header__settings-btn" style="color: inherit; font-size: 1.25rem;">
    <i class="fa-solid fa-gear"></i>
  </a>
      </header>

      <!-- SUB-ABAS DE TIMES -->
      <div class="sub-tabs">
        <a
          href="sorteio.html"
          class="sub-tabs__button"
          style="text-align: center; text-decoration: none"
          >Sorteio</a
        >
        <a
          href="times.html"
          class="sub-tabs__button sub-tabs__button--active"
          style="text-align: center; text-decoration: none"
          >Partida & Estatísticas</a
        >
      </div>

      <!-- CONTEÚDO PRINCIPAL (SCROLLÁVEL) -->
      <section class="match-management">
        <!-- BLOCO DO CRONÔMETRO -->
        <div class="match-timer">
          <div class="match-timer__selector">
            <button class="timer-btn">5 min</button>
            <button class="timer-btn timer-btn--active">7 min</button>
            <button class="timer-btn">10 min</button>
            <button class="timer-btn">15 min</button>
            <button class="timer-btn">20 min</button>
          </div>

          <div class="match-timer__display-container">
            <!-- Círculo de progresso simulado -->
            <svg class="timer-circle" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="45" class="timer-circle__bg"></circle>
              <circle
                cx="50"
                cy="50"
                r="45"
                class="timer-circle__progress"
              ></circle>
            </svg>
            <div class="match-timer__clock">00:00</div>
          </div>

          <button class="match-timer__action-btn">Iniciar</button>
        </div>

        <!-- REGISTRO DE EVENTOS -->
        <div class="events-register">
          <h3 class="section-title">Registro de Eventos (Em Aberto)</h3>

          <div class="events-register__panel">
            <!-- Seleção do Jogador -->
            <div class="events-register__players">
              <div class="player-select-wrapper">
                <img
                  src="https://via.placeholder.com/40"
                  alt="R. Silva"
                  class="player-select-thumb"
                />
                <select class="player-dropdown">
                  <option>R. SILVA</option>
                  <option>J. CARLOS</option>
                  <option>M. COSTA</option>
                  <option>F. ALMEIDA</option>
                  <option>L. MEIDA</option>
                </select>
              </div>
              <div class="player-select-wrapper">
                <img
                  src="https://via.placeholder.com/40"
                  alt="J. Carlos"
                  class="player-select-thumb"
                />
                <select class="player-dropdown">
                  <option>J. CARLOS</option>
                  <option>R. SILVA</option>
                  <option>M. COSTA</option>
                  <option>F. ALMEIDA</option>
                  <option>O. COTA</option>
                </select>
              </div>
            </div>

            <!-- Botões de Ações Rápidas -->
            <div class="events-register__actions">
              <button class="action-btn action-btn--goal">
                <i class="fa-solid fa-circle-dot"></i> GOL
              </button>
              <button class="action-btn action-btn--assist">
                <i class="fa-solid fa-share"></i> ASSISTÊNCIA
              </button>
              <button class="action-btn action-btn--save">
                <i class="fa-solid fa-mitten"></i> DEFESA DIFÍCIL
              </button>
              <button class="action-btn action-btn--yellow">
                <div class="card-icon card-icon--yellow"></div>
                AMARELO
              </button>
              <button class="action-btn action-btn--red">
                <div class="card-icon card-icon--red"></div>
                VERMELHO
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- BARRA DE NAVEGAÇÃO INFERIOR -->
      <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav__item">
          <i class="fa-solid fa-house"></i>
          <span>Início</span>
        </a>
        <a href="times.html" class="bottom-nav__item bottom-nav__item--active">
          <i class="fa-solid fa-users"></i>
          <span>Times</span>
        </a>
        <a href="chat.html" class="bottom-nav__item">
          <i class="fa-solid fa-comments"></i>
          <span>Chat</span>
        </a>
        <a href="historico.html" class="bottom-nav__item">
          <i class="fa-solid fa-clock-rotate-left"></i>
          <span>Histórico</span>
        </a>
        <a href="perfil.html" class="bottom-nav__item">
          <i class="fa-solid fa-user"></i>
          <span>Perfil</span>
        </a>
      </nav>
    </main>
  </body>
</html>
